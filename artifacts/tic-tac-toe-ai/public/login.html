<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav>
     <a href="index.html">Go Back</a>
    </nav>
    <div id="choice">
      <button id="login">Login</button>
      <button id="signup">Sign Up</button>
    </div>
    <div id = "login-form">
      <input type="text" id="username-login" placeholder="Username">
      <input type="password" id="password-login" placeholder="Password">
      <button id="submit-login">Submit</button>
      <p id="error-login"></p>
    </div>
    <div id = "signup-form">
      <input type="text" id="username-new" placeholder="Username">
      <input type="password" id="password-new" placeholder="Password">
      <input type="password" id="confirm-password" placeholder="Confirm Password">
      <button id="submit-signup">Sign Up</button>
      <p id="error-signup"></p>
      <p id="success">Sign up succesful! Return to <a href="index.html">Home</a></p>
    </div>
    <script src="main.js"></script>
  </body>
</html>
