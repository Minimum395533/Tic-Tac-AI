<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe AI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav>
      <a href="index.html">Tic Tac Toe AI</a>
      <div id="Login-tab">
        <a href="login.html">Login</a>
      </div>
      <div id="Logged-in" class="hidden">
        <button id="signout-button">Sign Out</button>
      </div>
      <a href="leaderboard.html">Leaderboard</a>
    </nav>
    <div id="login-prompt">Log in to play</div>
    <div id="welcome-message" class="hidden"></div>
    <div id="start-game-button" class="hidden">
      <button id="start-game">Start Game</button>
    </div>
    <div id="modifiers-panel" class="hidden">
      <label for="difficulty">Difficulty:</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
      </select>
      <label for="personality">Personality:</label>
      <select id="personality">
        <option value="jokester">Jokester</option>
        <option value="chill" selected>Chill</option>
        <option value="evil">Evil</option>
      </select>
    </div>
    <div id="game-container" class="hidden">
      
      <p id="status"></p>
      <div id="board" class="hidden"></div>
      <div id="ai-comments">
        <label>AI Comments:</label>
        <div id="ai-comment-text">Ai is thinking</div>
      </div>
    </div>
    <script src="main.js"></script>
    <script src="game.js"></script>
  </body>
</html>
